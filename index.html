<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赛博打工人：BUG帝国 · 全球排行版</title>
    <style>
        * {
            touch-action: manipulation;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0;
            --bg: #050505;
            --danger: #ff0055;
            --highlight: #00ffff;
            --boss-color: #ff3300;
            --card-bg: rgba(10, 10, 20, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body.boss-mode {
            background-color: #1a0505;
            animation: shake-bg 0.2s infinite;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 16px 12px 30px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            text-align: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 12px 20px;
            width: 100%;
            border: 1px solid rgba(0,255,0,0.3);
        }

        body.boss-mode .dashboard {
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(255,0,85,0.4);
            background: rgba(30,0,0,0.7);
        }

        h1 { font-size: 1rem; margin: 0 0 6px; letter-spacing: 1px; opacity: 0.9; }
        .score-container { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .cps-container { font-size: 0.85rem; color: var(--highlight); }

        .nickname-panel {
            background: #0a0a12cc;
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid var(--primary);
            backdrop-filter: blur(8px);
        }
        .nickname-input {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 14px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 0.9rem;
            flex: 2;
            min-width: 130px;
            outline: none;
        }
        .nickname-btn {
            background: #0a0a0a;
            border: 1px solid cyan;
            color: cyan;
            border-radius: 40px;
            padding: 6px 16px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .nickname-btn:active { transform: scale(0.96); background: cyan; color: black;}

        .target-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a2a, #000000);
            border: 4px solid var(--primary);
            box-shadow: 0 0 15px var(--primary), inset 0 0 15px rgba(0,255,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            margin: 8px auto;
            background-color: #111;
        }

        .target-btn:active { transform: scale(0.92); }

        body.boss-mode .target-btn {
            border-color: var(--danger);
            box-shadow: 0 0 35px var(--danger);
            animation: pulse-red 0.2s infinite alternate;
        }

        .leaderboard-card {
            background: #050510cc;
            backdrop-filter: blur(8px);
            border: 1px solid #0f0f55;
            border-radius: 28px;
            margin: 18px 0 8px;
            width: 100%;
            padding: 12px 12px;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #0f0;
            margin-bottom: 8px;
            padding-bottom: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .rank-list {
            max-height: 160px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px;
            border-bottom: 1px dashed rgba(0,255,0,0.2);
        }
        .rank-number { width: 35px; color: gold; font-weight: bold; }
        .rank-name { flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-score { font-family: monospace; font-weight: bold; color: var(--highlight); }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 12px;
            width: 100%;
        }
        .upgrade-btn {
            background: #111;
            border: 1px solid var(--highlight);
            color: var(--highlight);
            padding: 10px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 32px;
            flex: 1 1 auto;
            min-width: 120px;
            text-align: center;
        }
        .upgrade-btn:active:not(:disabled) { transform: scale(0.96); background: var(--highlight); color: black; }
        .upgrade-btn:disabled { opacity: 0.4; }

        /* 隐藏外挂面板 */
        .cheat-panel {
            display: none;
            background: #0a0a1ae0;
            backdrop-filter: blur(8px);
            border-radius: 24px;
            margin: 16px 0 8px;
            padding: 12px 16px;
            width: 100%;
            border: 1px solid #ffaa33;
        }
        .cheat-panel.cheat-visible {
            display: block;
        }
        .cheat-title {
            font-size: 0.8rem;
            color: #ffaa33;
            margin-bottom: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cheat-control {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .cheat-input {
            background: #111;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 8px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.9rem;
            flex: 2;
            min-width: 120px;
        }
        .cheat-btn {
            background: #2a1a0a;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            border-radius: 40px;
            padding: 6px 18px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .cheat-btn:active { transform: scale(0.96); background: #ffaa33; color: black; }

        /* 在线讨论区 */
        .discuss-card {
            background: #0a0a1cc0;
            backdrop-filter: blur(8px);
            border-radius: 28px;
            margin: 12px 0 8px;
            width: 100%;
            border: 1px solid var(--primary);
            padding: 12px;
        }
        .discuss-header {
            font-weight: bold;
            font-size: 0.85rem;
            border-bottom: 1px solid cyan;
            margin-bottom: 10px;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }
        .messages-area {
            max-height: 180px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px 12px;
            margin-bottom: 10px;
            font-size: 0.75rem;
        }
        .chat-message {
            border-bottom: 1px dashed rgba(0,255,255,0.2);
            padding: 6px 0;
            word-break: break-word;
        }
        .msg-name {
            color: #ffaa88;
            font-weight: bold;
        }
        .msg-time {
            font-size: 0.6rem;
            color: #aaa;
            margin-left: 8px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-input {
            flex: 3;
            background: #111;
            border: 1px solid cyan;
            color: cyan;
            border-radius: 60px;
            padding: 8px 14px;
            font-family: monospace;
            font-size: 0.8rem;
        }
        .chat-send {
            background: #0a0a0a;
            border: 1px solid cyan;
            color: cyan;
            border-radius: 40px;
            padding: 6px 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .extra-features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
            width: 100%;
        }
        .feature-badge {
            background: rgba(0,255,255,0.1);
            border: 1px solid #0f0;
            border-radius: 60px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn {
            background: #222;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.96); background: #ffaa33; color: black; }

        .secret-boss-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ff6666;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            backdrop-filter: blur(8px);
            transition: 0.05s linear;
        }

        .floating-text {
            position: fixed;
            font-weight: bold;
            font-size: 1.4rem;
            pointer-events: none;
            animation: floatUp 0.9s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 3px black;
        }
        @keyframes floatUp {
            0% { transform: translateY(0px) scale(0.8); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.3); opacity: 0; }
        }
        @keyframes shake-bg {
            0% { transform: translate(1px, 1px); }
            25% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes pulse-red {
            from { box-shadow: 0 0 20px #ff0055; }
            to { box-shadow: 0 0 60px #ff3300; }
        }

        .toast-msg {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(12px);
            border: 2px solid gold;
            border-radius: 40px;
            padding: 8px 18px;
            color: gold;
            font-weight: bold;
            z-index: 300;
            animation: fadeOut 1.5s forwards;
            text-align: center;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(0.9); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) scale(1.1); visibility: hidden; }
        }

        .combo-indicator {
            position: fixed;
            top: 80px;
            right: 15px;
            background: #000000aa;
            border-left: 5px solid cyan;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: cyan;
            z-index: 99;
            pointer-events: none;
        }
        .save-tip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 12px;
            color: #0f0;
            pointer-events: none;
            z-index: 99;
        }
        .auto-refresh-badge {
            font-size: 0.65rem;
            color: #0f0;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        @media (max-width: 500px) {
            .target-btn { width: 160px; height: 160px; font-size: 3.5rem; }
            .score-container { font-size: 2.5rem; }
            .rank-list { max-height: 140px; }
        }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
    <div class="dashboard">
        <h1 id="statusText">🐞 赛博打工人 · BUG帝国 ⚡</h1>
        <div class="score-container" id="score">0</div>
        <div class="cps-container"><span id="cps">0</span> 个/秒 (自动修复)</div>
        <div class="cps-container" style="font-size:0.7rem;">⚡ 暴击率: <span id="critMult">15%/2.0x</span> &nbsp;| 🔥 连击: <span id="comboCount">0</span></div>
    </div>

    <div class="nickname-panel">
        <input type="text" id="nicknameInput" class="nickname-input" placeholder="输入你的代号" maxlength="16" autocomplete="off">
        <button id="setNicknameBtn" class="nickname-btn">🎭 注册/改名</button>
        <div class="feature-badge" id="currentNickDisplay">👤 未命名</div>
    </div>

    <button class="target-btn" id="clickBtn">
        <span>🐛</span>
    </button>

    <div class="shop">
        <button class="upgrade-btn" id="btnUpgradeClick">
            升级键盘 ⌨️<br>
            <small>花费: <span id="costClick">100</span></small><br>
            <small>+1 点击伤害</small>
        </button>
        <button class="upgrade-btn" id="btnUpgradeAuto">
            雇佣实习生 🤖<br>
            <small>花费: <span id="costAuto">500</span></small><br>
            <small>+5/秒</small>
        </button>
    </div>

    <!-- 隐藏外挂面板 -->
    <div class="cheat-panel" id="cheatPanel">
        <div class="cheat-title">⚙️ 开发者控制台</div>
        <div class="cheat-control">
            <input type="number" id="cheatScoreInput" class="cheat-input" placeholder="设定分数" value="10000">
            <button id="cheatSetScoreBtn" class="cheat-btn">💾 修改分数并同步</button>
        </div>
        <div style="font-size:0.65rem; margin-top:6px; color:#ffaa66;">※ 修改后实时上传排行榜</div>
    </div>

    <!-- 在线讨论区 - 全球实时 -->
    <div class="discuss-card">
        <div class="discuss-header">
            <span>💬 全球打工闲聊 (实时)</span>
            <button id="clearChatBtn" style="background:none; border:none; color:#f99; font-size:10px; cursor:pointer;">🗑️ 清空本地</button>
        </div>
        <div id="chatMessagesArea" class="messages-area">
            <div class="chat-message">✨ 加载全球聊天中...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatMessageInput" class="chat-input" placeholder="输入消息，全球玩家可见..." maxlength="100">
            <button id="sendChatBtn" class="chat-send">📨 发送</button>
        </div>
        <div style="font-size:10px; text-align:center; margin-top:6px;">🌐 所有消息云端同步 | 友善交流</div>
    </div>

    <div class="leaderboard-card">
        <div class="leaderboard-header">
            <span>🏆 全球打工人排行榜 <span class="auto-refresh-badge" id="autoRefreshBadge">🔄 自动刷新中</span></span>
            <button id="refreshLeaderboardBtn" style="background:transparent; border:none; color:#0f0; font-size:12px; cursor:pointer;">🔄 手动刷新</button>
        </div>
        <div id="rankListContainer" class="rank-list">
            <div class="rank-item">✨ 加载排行榜中...</div>
        </div>
        <div style="font-size:10px; text-align:center; margin-top:6px;">✨ 每10秒自动更新 | 公平竞技 ✨</div>
    </div>

    <!-- 保留的趣味功能 -->
    <div class="extra-features">
        <button class="action-btn" id="luckDrawBtn">🎲 幸运轮盘</button>
        <button class="action-btn" id="investBtn">📈 赛博炒股</button>
        <button class="action-btn" id="rageModeBtn" style="border-color:#ff66aa;">😈 临时狂暴</button>
        <button class="action-btn" id="resetBtn" style="border-color:#ff4444;">🔄 转世重生</button>
        <div class="feature-badge" id="achievementBadge">🏆 成就: 新手码农</div>
    </div>
</div>

<!-- 左下角神秘按钮：连点6次开关外挂面板（无任何提示） -->
<div class="secret-boss-btn" id="secretBossBtn">👁️</div>
<div class="combo-indicator" id="comboIndicator">🔥 0连击</div>
<div class="save-tip" id="saveTip">💾 本地存档中</div>

<script>
    // ========== Supabase 配置 ==========
    const SUPABASE_URL = "https://gcmtafldxznnrtjekxgg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbXRhZmxkeHpubnJ0amVreGdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDEwODQsImV4cCI6MjA5MjA3NzA4NH0.-ZUF26LfBTBSHyrjENI-Rj-8xKQiS2yKLgv7vQ03Tio";
    
    async function supabaseFetch(method, data = null, table = 'worker_rank') {
        const url = `${SUPABASE_URL}/rest/v1/${table}`;
        const headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
        };
        try {
            if (method === 'GET') {
                let queryUrl = url;
                if (table === 'worker_rank') queryUrl += '?order=score.desc&limit=20';
                if (table === 'chat_messages') queryUrl += '?order=created_at.desc&limit=50';
                const response = await fetch(queryUrl, { headers });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } else if (method === 'POST') {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return true;
            } else if (method === 'DELETE') {
                const response = await fetch(url, {
                    method: 'DELETE',
                    headers: headers,
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return true;
            }
        } catch(e) {
            console.warn(`Supabase error (${table}):`, e);
            return null;
        }
    }

    // 排行榜专用 UPSERT (更新或插入)
    async function upsertScore(nickname, score) {
        const url = `${SUPABASE_URL}/rest/v1/worker_rank`;
        const headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'resolution=merge-duplicates'
        };
        try {
            await fetch(url, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({ nickname, score, updated_at: new Date().toISOString() })
            });
            return true;
        } catch(e) { console.warn(e); return false; }
    }

    // 删除旧昵称的排行榜记录
    async function deleteOldNickname(nickname) {
        if (!nickname) return false;
        const url = `${SUPABASE_URL}/rest/v1/worker_rank?nickname=eq.${encodeURIComponent(nickname)}`;
        const headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        };
        try {
            const response = await fetch(url, {
                method: 'DELETE',
                headers: headers
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            console.log(`已删除旧昵称记录: ${nickname}`);
            return true;
        } catch(e) { 
            console.warn("删除旧记录失败:", e); 
            return false;
        }
    }

    // ========== 游戏核心状态 ==========
    let state = {
        score: 0,
        clickPower: 1,
        autoRate: 0,
        costClick: 100,
        costAuto: 500,
        isBossMode: false,
        critChance: 0.15,
        critDamage: 2.0,
        combo: 0,
        lastClickTime: 0,
        tempRageEnd: 0,
        tempRageMult: 1,
        nickname: ""
    };

    // DOM 元素
    const elScore = document.getElementById('score');
    const elCps = document.getElementById('cps');
    const elCostClick = document.getElementById('costClick');
    const elCostAuto = document.getElementById('costAuto');
    const elStatusText = document.getElementById('statusText');
    const elCritMult = document.getElementById('critMult');
    const elComboSpan = document.getElementById('comboCount');
    const comboIndicatorDiv = document.getElementById('comboIndicator');
    const clickBtn = document.getElementById('clickBtn');
    const secretBossBtn = document.getElementById('secretBossBtn');
    const saveTipSpan = document.getElementById('saveTip');
    const nicknameInput = document.getElementById('nicknameInput');
    const setNicknameBtn = document.getElementById('setNicknameBtn');
    const currentNickDisplay = document.getElementById('currentNickDisplay');
    const rankListContainer = document.getElementById('rankListContainer');
    const cheatPanel = document.getElementById('cheatPanel');

    function createFloatingText(x, y, text, isCrit = false) {
        const div = document.createElement('div');
        div.className = 'floating-text';
        div.innerText = text;
        div.style.left = `${x - 20}px`;
        div.style.top = `${y - 20}px`;
        if (isCrit) div.style.color = '#ffaa44';
        div.style.fontSize = isCrit ? '1.8rem' : '1.3rem';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function createGlobalToast(msg, duration=1500) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function addScore(amount, fromAuto = false) {
        let finalAmount = amount;
        if (Date.now() < state.tempRageEnd) finalAmount = Math.floor(finalAmount * state.tempRageMult);
        finalAmount = Math.floor(finalAmount);
        state.score += finalAmount;
        updateUI();
        syncScoreToCloud();
        saveLocalData();
    }

    function computeClickDamage() {
        let base = state.clickPower;
        let mult = 1;
        let isCrit = false;
        if (Math.random() < state.critChance) { isCrit = true; mult = state.critDamage; }
        let comboBonus = 1 + Math.min(0.5, state.combo * 0.02);
        let finalDamage = Math.floor(base * mult * comboBonus);
        if (state.isBossMode) finalDamage *= 10;
        return { damage: finalDamage, isCrit };
    }

    function updateCombo() {
        const now = Date.now();
        if (now - state.lastClickTime < 1200) {
            state.combo = Math.min(state.combo + 1, 30);
        } else {
            state.combo = 0;
        }
        state.lastClickTime = now;
        if (elComboSpan) elComboSpan.innerText = state.combo;
        if (comboIndicatorDiv) {
            comboIndicatorDiv.innerText = `🔥 ${state.combo}连击`;
            comboIndicatorDiv.style.color = state.combo >= 10 ? "gold" : "cyan";
        }
    }

    function handleClick(e) {
        e.preventDefault();
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        updateCombo();
        let { damage, isCrit } = computeClickDamage();
        addScore(damage);
        let text = `+${damage}`;
        if (isCrit) text = `💥暴击! +${damage}`;
        if (state.isBossMode) text = `🤯暴走! +${damage}`;
        createFloatingText(clientX, clientY, text, isCrit);
        clickBtn.style.transform = "scale(0.92)";
        setTimeout(() => { if(clickBtn) clickBtn.style.transform = ""; }, 100);
        const span = clickBtn.querySelector('span');
        if (span) span.innerHTML = state.isBossMode ? "👺" : "🐛";
    }

    if (clickBtn) {
        clickBtn.addEventListener('click', handleClick);
        clickBtn.addEventListener('touchstart', handleClick, { passive: false });
    }

    function toggleBossMode() {
        state.isBossMode = !state.isBossMode;
        if(state.isBossMode) {
            document.body.classList.add('boss-mode');
            if(elStatusText) elStatusText.innerText = "⚠️ 高压模式 · 收益暴增 ⚠️";
        } else {
            document.body.classList.remove('boss-mode');
            if(elStatusText) elStatusText.innerText = "🐞 赛博打工人 · BUG帝国 ⚡";
        }
        updateUI();
    }
    
    // ========== 隐藏外挂：连点6次开关 ==========
    let cheatTapCount = 0, cheatUnlockTimer = null;
    if (secretBossBtn) {
        secretBossBtn.addEventListener('click', () => {
            cheatTapCount++;
            if(cheatUnlockTimer) clearTimeout(cheatUnlockTimer);
            cheatUnlockTimer = setTimeout(() => { cheatTapCount = 0; }, 800);
            if(cheatTapCount >= 6) {
                if(cheatPanel) {
                    if(cheatPanel.classList.contains('cheat-visible')) {
                        cheatPanel.classList.remove('cheat-visible');
                    } else {
                        cheatPanel.classList.add('cheat-visible');
                    }
                }
                cheatTapCount = 0;
            }
            secretBossBtn.style.transform = "scale(0.8)";
            setTimeout(() => { if(secretBossBtn) secretBossBtn.style.transform = ""; }, 150);
        });
    }

    function buyClickUpgrade() { 
        if (state.score >= state.costClick) { 
            state.score -= state.costClick; 
            state.clickPower += 1; 
            state.costClick = Math.floor(state.costClick * 1.5); 
            updateUI(); 
            createGlobalToast(`⌨️ 键盘升级！点击+1 (当前${state.clickPower})`, 1000);
            syncScoreToCloud(); 
            saveLocalData();
        } else {
            createGlobalToast(`💰 需要 ${state.costClick} 积分！`, 800);
        }
    }
    
    function buyAutoUpgrade() { 
        if (state.score >= state.costAuto) { 
            state.score -= state.costAuto; 
            state.autoRate += 5; 
            state.costAuto = Math.floor(state.costAuto * 1.3); 
            updateUI(); 
            createGlobalToast(`🤖 实习生+5/秒 (当前${state.autoRate}/秒)`, 1000);
            syncScoreToCloud(); 
            saveLocalData();
        } else {
            createGlobalToast(`💰 需要 ${state.costAuto} 积分！`, 800);
        }
    }
    
    const btnUpgradeClick = document.getElementById('btnUpgradeClick');
    const btnUpgradeAuto = document.getElementById('btnUpgradeAuto');
    if (btnUpgradeClick) btnUpgradeClick.onclick = buyClickUpgrade;
    if (btnUpgradeAuto) btnUpgradeAuto.onclick = buyAutoUpgrade;

    setInterval(() => { 
        if (state.autoRate > 0) addScore(state.autoRate, true); 
    }, 1000);

    // 趣味功能
    document.getElementById('luckDrawBtn')?.addEventListener('click', () => {
        if(state.score<200){createGlobalToast("💰 需要200积分!");return;}
        state.score-=200;
        let r=Math.random();
        if(r<0.4){let gain=300+Math.floor(Math.random()*400); state.score+=gain; createGlobalToast(`🎉 轮盘: +${gain}`);}
        else if(r<0.7){state.critChance=Math.min(0.5,state.critChance+0.05); createGlobalToast(`✨暴击率+5% 现为${Math.floor(state.critChance*100)}%`);}
        else if(r<0.85){state.autoRate+=3; createGlobalToast(`🤖实习生+3`);}
        else{state.clickPower+=2; createGlobalToast(`💪点击+2`);}
        updateUI(); syncScoreToCloud(); saveLocalData();
    });
    document.getElementById('investBtn')?.addEventListener('click', () => {
        if(state.score<500){createGlobalToast("需要500积分炒股");return;}
        state.score-=500;
        let random = Math.random();
        if(random<0.5){ let gain = 400+Math.floor(Math.random()*600); state.score+=gain; createGlobalToast(`📈 股票暴涨! +${gain}`);}
        else { createGlobalToast(`📉 股市崩盘，血本无归...`);}
        updateUI(); syncScoreToCloud(); saveLocalData();
    });
    document.getElementById('rageModeBtn')?.addEventListener('click', () => {
        if(state.score<800){createGlobalToast("需要800积分狂暴");return;}
        state.score-=800;
        state.tempRageEnd = Date.now() + 20000;
        state.tempRageMult = 2.5;
        createGlobalToast("😈 狂暴模式开启! 20秒内收益2.5倍");
        updateUI(); syncScoreToCloud(); saveLocalData();
    });
    document.getElementById('resetBtn')?.addEventListener('click', () => {
        if(confirm("⚠️ 转世重生将清空所有积分、升级，仅保留昵称？")){
            state.score = 0;
            state.clickPower = 1;
            state.autoRate = 0;
            state.costClick = 100;
            state.costAuto = 500;
            state.critChance = 0.15;
            state.critDamage = 2.0;
            state.combo = 0;
            state.tempRageEnd = 0;
            updateUI();
            syncScoreToCloud();
            saveLocalData();
            createGlobalToast("🔄 转世重生！从零开始奋斗", 1500);
        }
    });

    // 外挂修改分数
    const cheatScoreInput = document.getElementById('cheatScoreInput');
    const cheatSetScoreBtn = document.getElementById('cheatSetScoreBtn');
    if(cheatSetScoreBtn){
        cheatSetScoreBtn.onclick = () => {
            let newScore = parseInt(cheatScoreInput.value);
            if(isNaN(newScore)) { createGlobalToast("请输入有效数字"); return; }
            if(newScore < 0) newScore = 0;
            state.score = newScore;
            updateUI();
            syncScoreToCloud();
            saveLocalData();
            createGlobalToast(`✨ 分数已修改为 ${newScore.toLocaleString()}`, 1200);
        };
    }

    // ========== 全球实时聊天 (Supabase) ==========
    async function loadGlobalChat() {
        try {
            const messages = await supabaseFetch('GET', null, 'chat_messages');
            if (messages && messages.length > 0) {
                const container = document.getElementById('chatMessagesArea');
                const reversed = [...messages].reverse();
                container.innerHTML = reversed.map(m => {
                    let timeStr = new Date(m.created_at).toLocaleTimeString().slice(0,5);
                    let displayName = m.nickname === state.nickname ? `✨${m.nickname}✨` : m.nickname;
                    return `<div class="chat-message"><span class="msg-name">${escapeHtml(displayName)}</span><span class="msg-time">${timeStr}</span><br>${escapeHtml(m.message)}</div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            } else {
                document.getElementById('chatMessagesArea').innerHTML = '<div class="chat-message">✨ 暂无消息，快来全球首发言！</div>';
            }
        } catch(e) { console.warn(e); }
    }

    async function sendGlobalMessage() {
        let input = document.getElementById('chatMessageInput');
        let msg = input.value.trim();
        if(!msg) return;
        if(!state.nickname || state.nickname === ""){ createGlobalToast("请先设置昵称再发言"); return; }
        const success = await supabaseFetch('POST', { nickname: state.nickname, message: msg }, 'chat_messages');
        if(success) {
            input.value = "";
            await loadGlobalChat();
            createGlobalToast("💬 消息已发送到全球", 800);
        } else {
            createGlobalToast("发送失败，请检查网络", 1000);
        }
    }

    document.getElementById('sendChatBtn')?.addEventListener('click', sendGlobalMessage);
    document.getElementById('chatMessageInput')?.addEventListener('keypress', (e)=>{ if(e.key==='Enter') sendGlobalMessage(); });
    document.getElementById('clearChatBtn')?.addEventListener('click', ()=>{
        loadGlobalChat();
        createGlobalToast("已刷新聊天记录", 800);
    });

    async function syncScoreToCloud() {
        if(!state.nickname || state.nickname === "") return;
        try {
            await upsertScore(state.nickname, Math.floor(state.score));
            if(saveTipSpan) {
                saveTipSpan.innerText = "☁️ 已同步";
                setTimeout(() => { if(saveTipSpan) saveTipSpan.innerText = "💾 本地存档中"; }, 1500);
            }
        } catch(e) { console.warn(e); }
    }

    async function fetchLeaderboard() {
        if(!rankListContainer) return;
        try {
            const data = await supabaseFetch('GET', null, 'worker_rank');
            if(data && data.length > 0) {
                rankListContainer.innerHTML = data.map((item, idx) => `
                    <div class="rank-item">
                        <span class="rank-number">${idx+1}</span>
                        <span class="rank-name">${escapeHtml(item.nickname)}</span>
                        <span class="rank-score">${Math.floor(item.score).toLocaleString()}</span>
                    </div>
                `).join('');
            } else {
                rankListContainer.innerHTML = '<div class="rank-item">✨ 暂无数据，快成为第一个打工人！</div>';
            }
        } catch(e) {
            rankListContainer.innerHTML = '<div class="rank-item">⚠️ 请先在Supabase创建worker_rank表</div>';
        }
    }
    
    function escapeHtml(str) { 
        if(!str) return "??"; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }

    // 核心：改名功能 - 删除旧记录，将积分迁移到新昵称
    async function setNickname() {
        let newName = nicknameInput ? nicknameInput.value.trim() : "";
        if(newName === "") { createGlobalToast("请输入昵称(1~16字符)", 1000); return; }
        if(newName.length > 16) newName = newName.slice(0,16);
        
        const oldNick = state.nickname;
        // 如果新旧昵称相同，无需操作
        if(oldNick === newName) {
            createGlobalToast("昵称相同，无需修改", 800);
            return;
        }
        
        // 保存当前积分
        const currentScore = state.score;
        
        // 1. 如果有旧昵称，删除旧记录（清除残留数据）
        if(oldNick && oldNick !== "") {
            await deleteOldNickname(oldNick);
            createGlobalToast(`🗑️ 已清除旧昵称「${oldNick}」的排行榜记录`, 1200);
        }
        
        // 2. 更新状态中的昵称
        state.nickname = newName;
        
        // 3. 更新本地存储绑定
        localStorage.setItem('deviceBoundNickname', newName);
        if(currentNickDisplay) currentNickDisplay.innerText = `👤 ${state.nickname}`;
        
        // 4. 将当前积分上传到新昵称
        await syncScoreToCloud();
        
        // 5. 刷新排行榜显示
        await fetchLeaderboard();
        
        // 6. 保存本地存档
        saveLocalData();
        
        createGlobalToast(`✅ 昵称已更改为「${state.nickname}」，`, 2000);
    }

    function saveLocalData() {
        if(!state.nickname) return;
        let data = { 
            nickname: state.nickname,
            score: state.score,
            clickPower: state.clickPower,
            autoRate: state.autoRate,
            costClick: state.costClick,
            costAuto: state.costAuto,
            critChance: state.critChance,
            critDamage: state.critDamage,
            isBossMode: state.isBossMode
        };
        localStorage.setItem('cyberWorkerFull', JSON.stringify(data));
    }
    
    function loadLocalData() {
        let boundNick = localStorage.getItem('deviceBoundNickname');
        let rawData = localStorage.getItem('cyberWorkerFull');
        if(!rawData) rawData = localStorage.getItem('cyberWorkerData');
        
        if(rawData) {
            try {
                let d = JSON.parse(rawData);
                if(boundNick && d.nickname === boundNick) {
                    state.nickname = boundNick;
                    state.score = d.score || 0;
                    state.clickPower = d.clickPower || 1;
                    state.autoRate = d.autoRate || 0;
                    state.costClick = d.costClick || 100;
                    state.costAuto = d.costAuto || 500;
                    state.critChance = d.critChance !== undefined ? d.critChance : 0.15;
                    state.critDamage = d.critDamage !== undefined ? d.critDamage : 2.0;
                    state.isBossMode = d.isBossMode || false;
                } else if(boundNick && (!d.nickname || d.nickname !== boundNick)) {
                    state.nickname = boundNick;
                    state.score = d.score || 0;
                    state.clickPower = d.clickPower || 1;
                    state.autoRate = d.autoRate || 0;
                    state.costClick = d.costClick || 100;
                    state.costAuto = d.costAuto || 500;
                    state.critChance = d.critChance !== undefined ? d.critChance : 0.15;
                    state.critDamage = d.critDamage !== undefined ? d.critDamage : 2.0;
                    state.isBossMode = d.isBossMode || false;
                } else if(!boundNick && d.nickname) {
                    state.nickname = d.nickname;
                    localStorage.setItem('deviceBoundNickname', d.nickname);
                    state.score = d.score || 0;
                    state.clickPower = d.clickPower || 1;
                    state.autoRate = d.autoRate || 0;
                    state.costClick = d.costClick || 100;
                    state.costAuto = d.costAuto || 500;
                    state.critChance = d.critChance !== undefined ? d.critChance : 0.15;
                    state.critDamage = d.critDamage !== undefined ? d.critDamage : 2.0;
                    state.isBossMode = d.isBossMode || false;
                }
            } catch(e) { console.warn("读取存档失败", e); }
        }
        
        if(!state.nickname) state.nickname = "";
        if(currentNickDisplay && state.nickname) currentNickDisplay.innerText = `👤 ${state.nickname}`;
        if(nicknameInput && state.nickname) nicknameInput.value = state.nickname;
        if(state.isBossMode) document.body.classList.add('boss-mode');
        else document.body.classList.remove('boss-mode');
        updateUI();
    }

    function updateAchievement() { 
        const badge = document.getElementById('achievementBadge');
        if(!badge) return;
        if(state.score>=10000) badge.innerText="🏆 成就: 代码之神"; 
        else if(state.score>=5000) badge.innerText="🏆 成就: 全栈宗师"; 
        else if(state.score>=2000) badge.innerText="🏆 成就: 资深码农"; 
        else badge.innerText="🏆 成就: 新手码农"; 
    }

    function updateUI() {
        if(elScore) elScore.innerText = Math.floor(state.score).toLocaleString();
        if(elCps) elCps.innerText = state.autoRate;
        if(elCostClick) document.getElementById('costClick').innerText = state.costClick.toLocaleString();
        if(elCostAuto) document.getElementById('costAuto').innerText = state.costAuto.toLocaleString();
        if(elCritMult) elCritMult.innerText = `${Math.floor(state.critChance*100)}%/${state.critDamage.toFixed(1)}x`;
        if(btnUpgradeClick) btnUpgradeClick.disabled = state.score < state.costClick;
        if(btnUpgradeAuto) btnUpgradeAuto.disabled = state.score < state.costAuto;
        updateAchievement();
        const span = clickBtn?.querySelector('span');
        if(span && !state.isBossMode) span.innerHTML = "🐛";
    }

    if(setNicknameBtn) setNicknameBtn.onclick = setNickname;
    const refreshBtn = document.getElementById('refreshLeaderboardBtn');
    if(refreshBtn) refreshBtn.onclick = fetchLeaderboard;
    
    let autoRefreshInterval = setInterval(() => { fetchLeaderboard(); }, 10000);
    let autoChatRefresh = setInterval(() => { loadGlobalChat(); }, 5000);
    
    loadLocalData();
    loadGlobalChat();
    updateUI();
    fetchLeaderboard();
    
    setInterval(() => { if(state.nickname) { syncScoreToCloud(); saveLocalData(); } }, 30000);
    window.addEventListener('beforeunload', () => { if(state.nickname) { syncScoreToCloud(); saveLocalData(); } clearInterval(autoRefreshInterval); clearInterval(autoChatRefresh); });
    createGlobalToast("🌍 全球聊天已上线！公平竞技", 4000);
</script>
</body>
</html>
