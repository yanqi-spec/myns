<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赛博打工人：BUG帝国 · 全球排行版</title>
    <style>
        * {
            touch-action: manipulation;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f0;
            --bg: #050505;
            --danger: #ff0055;
            --highlight: #00ffff;
            --boss-color: #ff3300;
            --card-bg: rgba(10, 10, 20, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body.boss-mode {
            background-color: #1a0505;
            animation: shake-bg 0.2s infinite;
        }

        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 560px;
            padding: 16px 12px 30px;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            text-align: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 12px 20px;
            width: 100%;
            border: 1px solid rgba(0,255,0,0.3);
        }

        body.boss-mode .dashboard {
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(255,0,85,0.4);
            background: rgba(30,0,0,0.7);
        }

        h1 { font-size: 1rem; margin: 0 0 6px; letter-spacing: 1px; opacity: 0.9; }
        .score-container { font-size: 3rem; font-weight: bold; margin: 5px 0; }
        .cps-container { font-size: 0.85rem; color: var(--highlight); }

        .nickname-panel {
            background: #0a0a12cc;
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid var(--primary);
            backdrop-filter: blur(8px);
        }
        .nickname-input {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 14px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 0.9rem;
            flex: 2;
            min-width: 130px;
            outline: none;
        }
        .nickname-btn {
            background: #0a0a0a;
            border: 1px solid cyan;
            color: cyan;
            border-radius: 40px;
            padding: 6px 16px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .nickname-btn:active { transform: scale(0.96); background: cyan; color: black;}

        .target-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a2a, #000000);
            border: 4px solid var(--primary);
            box-shadow: 0 0 15px var(--primary), inset 0 0 15px rgba(0,255,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            margin: 8px auto;
            background-color: #111;
        }

        .target-btn:active { transform: scale(0.92); }

        body.boss-mode .target-btn {
            border-color: var(--danger);
            box-shadow: 0 0 35px var(--danger);
            animation: pulse-red 0.2s infinite alternate;
        }

        .leaderboard-card {
            background: #050510cc;
            backdrop-filter: blur(8px);
            border: 1px solid #0f0f55;
            border-radius: 28px;
            margin: 18px 0 8px;
            width: 100%;
            padding: 12px 12px;
        }
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid #0f0;
            margin-bottom: 8px;
            padding-bottom: 6px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .rank-list {
            max-height: 180px;
            overflow-y: auto;
            font-size: 0.8rem;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px;
            border-bottom: 1px dashed rgba(0,255,0,0.2);
        }
        .rank-number { width: 35px; color: gold; font-weight: bold; }
        .rank-name { flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-score { font-family: monospace; font-weight: bold; color: var(--highlight); }

        .shop {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 20px;
            width: 100%;
        }
        .upgrade-btn {
            background: #111;
            border: 1px solid var(--highlight);
            color: var(--highlight);
            padding: 10px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 32px;
            flex: 1 1 auto;
            min-width: 120px;
            text-align: center;
        }
        .upgrade-btn:active:not(:disabled) { transform: scale(0.96); background: var(--highlight); color: black; }
        .upgrade-btn:disabled { opacity: 0.4; }

        .extra-features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
            width: 100%;
        }
        .feature-badge {
            background: rgba(0,255,255,0.1);
            border: 1px solid #0f0;
            border-radius: 60px;
            padding: 5px 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .action-btn {
            background: #222;
            border: 1px solid #ffaa33;
            color: #ffaa33;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.96); background: #ffaa33; color: black; }

        .secret-boss-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #ff6666;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .floating-text {
            position: fixed;
            font-weight: bold;
            font-size: 1.4rem;
            pointer-events: none;
            animation: floatUp 0.9s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 3px black;
        }
        @keyframes floatUp {
            0% { transform: translateY(0px) scale(0.8); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.3); opacity: 0; }
        }
        @keyframes shake-bg {
            0% { transform: translate(1px, 1px); }
            25% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes pulse-red {
            from { box-shadow: 0 0 20px #ff0055; }
            to { box-shadow: 0 0 60px #ff3300; }
        }

        .toast-msg {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(12px);
            border: 2px solid gold;
            border-radius: 40px;
            padding: 8px 18px;
            color: gold;
            font-weight: bold;
            z-index: 300;
            animation: fadeOut 1.5s forwards;
            text-align: center;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(0.9); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) scale(1.1); visibility: hidden; }
        }

        .combo-indicator {
            position: fixed;
            top: 80px;
            right: 15px;
            background: #000000aa;
            border-left: 5px solid cyan;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            color: cyan;
            z-index: 99;
            pointer-events: none;
        }
        .save-tip {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 12px;
            color: #0f0;
            pointer-events: none;
            z-index: 99;
        }
        /* 自动刷新提示动画 */
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .auto-refresh-badge {
            font-size: 0.65rem;
            color: #0f0;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }
        @media (max-width: 500px) {
            .target-btn { width: 160px; height: 160px; font-size: 3.5rem; }
            .score-container { font-size: 2.5rem; }
            .rank-list { max-height: 140px; }
        }
    </style>
</head>
<body>
<div class="grid-bg"></div>

<div class="container">
    <div class="dashboard">
        <h1 id="statusText">🐞 赛博打工人 · BUG帝国 ⚡</h1>
        <div class="score-container" id="score">0</div>
        <div class="cps-container"><span id="cps">0</span> 个/秒 (自动修复)</div>
        <div class="cps-container" style="font-size:0.7rem;">⚡ 暴击率: <span id="critMult">15%/2.0x</span> &nbsp;| 🔥 连击: <span id="comboCount">0</span></div>
    </div>

    <div class="nickname-panel">
        <input type="text" id="nicknameInput" class="nickname-input" placeholder="输入你的代号" maxlength="16">
        <button id="setNicknameBtn" class="nickname-btn">🎭 注册/改名</button>
        <div class="feature-badge" id="currentNickDisplay">👤 未命名</div>
    </div>

    <button class="target-btn" id="clickBtn">
        <span>🐛</span>
    </button>

    <div class="shop">
        <button class="upgrade-btn" id="btnUpgradeClick">
            升级键盘 ⌨️<br>
            <small>花费: <span id="costClick">100</span></small><br>
            <small>+1 点击伤害</small>
        </button>
        <button class="upgrade-btn" id="btnUpgradeAuto">
            雇佣实习生 🤖<br>
            <small>花费: <span id="costAuto">500</span></small><br>
            <small>+5/秒</small>
        </button>
    </div>

    <div class="leaderboard-card">
        <div class="leaderboard-header">
            <span>🏆 全球打工人排行榜 <span class="auto-refresh-badge" id="autoRefreshBadge">🔄 自动刷新中</span></span>
            <button id="refreshLeaderboardBtn" style="background:transparent; border:none; color:#0f0; font-size:12px; cursor:pointer;">🔄 手动刷新</button>
        </div>
        <div id="rankListContainer" class="rank-list">
            <div class="rank-item">✨ 加载排行榜中...</div>
        </div>
        <div style="font-size:10px; text-align:center; margin-top:6px;">✨ 每10秒自动更新 | 修复BUG越多排名越高 ✨</div>
    </div>

    <div class="extra-features">
        <button class="action-btn" id="luckDrawBtn">🎲 幸运轮盘</button>
        <button class="action-btn" id="nukeBtn">💣 核弹清理</button>
        <button class="action-btn" id="timeWarpBtn">⏩ 时间扭曲</button>
        <button class="action-btn" id="investBtn">📈 赛博炒股</button>
        <div class="feature-badge" id="petDisplay">🐱 打工喵: 休息</div>
        <button class="action-btn" id="petBtn">🐾 撸猫加薪</button>
        <button class="action-btn" id="rageModeBtn" style="border-color:#ff66aa;">😈 临时狂暴</button>
        <button class="action-btn" id="sharesBtn">📊 分红保险</button>
    </div>
    <div class="extra-features" style="margin-top: 6px;">
        <span class="feature-badge" id="achievementBadge">🏆 成就: 新手码农</span>
        <button class="action-btn" id="skinBtn">🎨 换皮肤</button>
        <button class="action-btn" id="coffeeBtn">☕ 咖啡因爆发</button>
        <button class="action-btn" id="magnetBtn">🧲 代码磁铁</button>
        <button class="action-btn" id="lotteryBtn">🎰 超级彩票</button>
        <button class="action-btn" id="mentorBtn">👨‍🏫 导师光环</button>
        <button class="action-btn" id="resetBtn" style="border-color:#ff4444;">🔄 转世重生</button>
    </div>
</div>

<div class="secret-boss-btn" id="secretBossBtn">👁️</div>
<div class="combo-indicator" id="comboIndicator">🔥 0连击</div>
<div class="save-tip" id="saveTip">💾 本地存档中</div>

<script>
    // ========== Supabase 配置（使用REST API）==========
    const SUPABASE_URL = "https://gcmtafldxznnrtjekxgg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjbXRhZmxkeHpubnJ0amVreGdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MDEwODQsImV4cCI6MjA5MjA3NzA4NH0.-ZUF26LfBTBSHyrjENI-Rj-8xKQiS2yKLgv7vQ03Tio";
    
    // REST API 封装
    async function supabaseFetch(method, data = null) {
        const url = `${SUPABASE_URL}/rest/v1/worker_rank`;
        const headers = {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
        };
        
        try {
            if (method === 'GET') {
                const response = await fetch(url + '?order=score.desc&limit=20', { headers });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } else if (method === 'UPSERT') {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'resolution=merge-duplicates' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            }
        } catch(e) {
            console.warn("Supabase error:", e);
            return null;
        }
    }

    // ========== 游戏核心状态 ==========
    let state = {
        score: 0,
        clickPower: 1,
        autoRate: 0,
        costClick: 100,
        costAuto: 500,
        isBossMode: false,
        critChance: 0.15,
        critDamage: 2.0,
        combo: 0,
        lastClickTime: 0,
        tempRageEnd: 0,
        tempRageMult: 1,
        skinIndex: 0,
        petHappy: 0,
        dividendRate: 0,
        coffeeEnd: 0,
        magnetActive: false,
        mentorActive: false,
        mentorBonus: 0,
        nickname: "无名打工人"
    };

    const skins = ["🐛", "🤖", "👾", "💀", "⭐"];

    // DOM 元素
    const elScore = document.getElementById('score');
    const elCps = document.getElementById('cps');
    const elCostClick = document.getElementById('costClick');
    const elCostAuto = document.getElementById('costAuto');
    const elStatusText = document.getElementById('statusText');
    const elCritMult = document.getElementById('critMult');
    const elComboSpan = document.getElementById('comboCount');
    const comboIndicatorDiv = document.getElementById('comboIndicator');
    const clickBtn = document.getElementById('clickBtn');
    const secretBossBtn = document.getElementById('secretBossBtn');
    const saveTipSpan = document.getElementById('saveTip');
    const nicknameInput = document.getElementById('nicknameInput');
    const setNicknameBtn = document.getElementById('setNicknameBtn');
    const currentNickDisplay = document.getElementById('currentNickDisplay');
    const rankListContainer = document.getElementById('rankListContainer');

    function createFloatingText(x, y, text, isCrit = false) {
        const div = document.createElement('div');
        div.className = 'floating-text';
        div.innerText = text;
        div.style.left = `${x - 20}px`;
        div.style.top = `${y - 20}px`;
        if (isCrit) div.style.color = '#ffaa44';
        div.style.fontSize = isCrit ? '1.8rem' : '1.3rem';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function createGlobalToast(msg, duration=1500) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    function addScore(amount, fromAuto = false) {
        let finalAmount = amount;
        if (Date.now() < state.tempRageEnd) finalAmount = Math.floor(finalAmount * state.tempRageMult);
        let petBonus = 1 + (state.petHappy * 0.06);
        finalAmount = Math.floor(finalAmount * petBonus);
        if (state.dividendRate > 0 && !fromAuto) finalAmount = Math.floor(finalAmount * (1 + state.dividendRate * 0.05));
        if (!fromAuto && state.mentorActive) finalAmount = Math.floor(finalAmount * (1 + state.mentorBonus * 0.1));
        if (Date.now() < state.coffeeEnd) finalAmount = Math.floor(finalAmount * 2);
        state.score += finalAmount;
        updateUI();
        syncScoreToCloud();
    }

    function computeClickDamage() {
        let base = state.clickPower;
        let mult = 1;
        let isCrit = false;
        if (Math.random() < state.critChance) { isCrit = true; mult = state.critDamage; }
        let comboBonus = 1 + Math.min(0.5, state.combo * 0.02);
        let finalDamage = Math.floor(base * mult * comboBonus);
        if (state.isBossMode) finalDamage *= 10;
        return { damage: finalDamage, isCrit };
    }

    function updateCombo() {
        const now = Date.now();
        if (now - state.lastClickTime < 1200) {
            state.combo = Math.min(state.combo + 1, 30);
        } else {
            state.combo = 0;
        }
        state.lastClickTime = now;
        if (elComboSpan) elComboSpan.innerText = state.combo;
        if (comboIndicatorDiv) {
            comboIndicatorDiv.innerText = `🔥 ${state.combo}连击`;
            comboIndicatorDiv.style.color = state.combo >= 10 ? "gold" : "cyan";
        }
    }

    function handleClick(e) {
        e.preventDefault();
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        updateCombo();
        let { damage, isCrit } = computeClickDamage();
        addScore(damage);
        let text = `+${damage}`;
        if (isCrit) text = `💥暴击! +${damage}`;
        if (state.isBossMode) text = `🤯暴走! +${damage}`;
        createFloatingText(clientX, clientY, text, isCrit);
        
        clickBtn.style.transform = "scale(0.92)";
        setTimeout(() => { if(clickBtn) clickBtn.style.transform = ""; }, 100);
        
        const span = clickBtn.querySelector('span');
        if (span && !state.isBossMode) {
            const icons = ['🐛', '💻', '⌨️', '⚙️', '🔧', '🖱️'];
            span.innerText = icons[Math.floor(Math.random() * icons.length)];
        } else if (span) {
            span.innerHTML = "👺";
        }
        
        if(state.magnetActive && Math.random()<0.3){
            let extra = Math.floor(state.clickPower * (1+state.combo*0.02));
            addScore(extra);
            createFloatingText(clientX+20, clientY-10, `🧲磁力+${extra}`, false);
        }
    }

    if (clickBtn) {
        clickBtn.addEventListener('click', handleClick);
        clickBtn.addEventListener('touchstart', handleClick, { passive: false });
        console.log("✅ 点击打工按钮已绑定");
    }

    function toggleBossMode() {
        state.isBossMode = !state.isBossMode;
        if(state.isBossMode) {
            document.body.classList.add('boss-mode');
            if(elStatusText) elStatusText.innerText = "⚠️ 高压模式 · 收益暴增 ⚠️";
            createGlobalToast("⚡ 极限挑战模式开启！收益10倍⚡", 1200);
        } else {
            document.body.classList.remove('boss-mode');
            if(elStatusText) elStatusText.innerText = "🐞 赛博打工人 · BUG帝国 ⚡";
            createGlobalToast("✨ 压力减轻，正常模式", 1000);
        }
        updateUI();
    }
    
    let bossTapCount = 0, bossTimer = null;
    if (secretBossBtn) {
        secretBossBtn.addEventListener('click', () => {
            bossTapCount++;
            if(bossTimer) clearTimeout(bossTimer);
            bossTimer = setTimeout(() => { bossTapCount = 0; }, 800);
            if(bossTapCount >= 6) { toggleBossMode(); bossTapCount = 0; }
            secretBossBtn.style.transform = "scale(0.8)";
            setTimeout(() => { if(secretBossBtn) secretBossBtn.style.transform = ""; }, 150);
        });
    }

    function buyClickUpgrade() { 
        if (state.score >= state.costClick) { 
            state.score -= state.costClick; 
            state.clickPower += 1; 
            state.costClick = Math.floor(state.costClick * 1.5); 
            updateUI(); 
            createGlobalToast(`⌨️ 键盘升级！点击+1 (当前${state.clickPower})`, 1000);
            syncScoreToCloud(); 
        } else {
            createGlobalToast(`💰 需要 ${state.costClick} 积分！`, 800);
        }
    }
    
    function buyAutoUpgrade() { 
        if (state.score >= state.costAuto) { 
            state.score -= state.costAuto; 
            state.autoRate += 5; 
            state.costAuto = Math.floor(state.costAuto * 1.3); 
            updateUI(); 
            createGlobalToast(`🤖 实习生+5/秒 (当前${state.autoRate}/秒)`, 1000);
            syncScoreToCloud(); 
        } else {
            createGlobalToast(`💰 需要 ${state.costAuto} 积分！`, 800);
        }
    }
    
    const btnUpgradeClick = document.getElementById('btnUpgradeClick');
    const btnUpgradeAuto = document.getElementById('btnUpgradeAuto');
    if (btnUpgradeClick) btnUpgradeClick.onclick = buyClickUpgrade;
    if (btnUpgradeAuto) btnUpgradeAuto.onclick = buyAutoUpgrade;

    setInterval(() => { 
        if (state.autoRate > 0) addScore(state.autoRate, true); 
    }, 1000);

    // 功能按钮
    document.getElementById('luckDrawBtn')?.addEventListener('click', () => {
        if(state.score<200){createGlobalToast("💰 需要200积分!");return;}
        state.score-=200;
        let r=Math.random();
        if(r<0.4){let gain=300+Math.floor(Math.random()*400); state.score+=gain; createGlobalToast(`🎉 轮盘: +${gain}`);}
        else if(r<0.7){state.critChance=Math.min(0.5,state.critChance+0.05); createGlobalToast(`✨暴击率+5% 现为${Math.floor(state.critChance*100)}%`);}
        else if(r<0.85){state.autoRate+=3; createGlobalToast(`🤖实习生+3`);}
        else{state.clickPower+=2; createGlobalToast(`💪点击+2`);}
        updateUI(); syncScoreToCloud();
    });
    
    document.getElementById('nukeBtn')?.addEventListener('click', () => {
        if(state.score<1500){createGlobalToast("❌ 核弹需要1500");return;}
        state.score-=1500;
        let bonus=20+Math.floor(Math.random()*20);
        state.autoRate+=bonus;
        createGlobalToast(`💣 核弹! +${bonus}/秒`);
        updateUI(); syncScoreToCloud();
    });
    
    document.getElementById('petBtn')?.addEventListener('click', () => {
        if(state.score<150){createGlobalToast("需要150撸猫");return;}
        state.score-=150;
        state.petHappy=Math.min(5,state.petHappy+1);
        document.getElementById('petDisplay').innerText=`🐱 打工喵: +${state.petHappy*6}%伤害`;
        createGlobalToast(`🐈 猫咪快乐! +${state.petHappy*6}%伤害`);
        updateUI(); syncScoreToCloud();
    });
    
    document.getElementById('skinBtn')?.addEventListener('click', () => {
        state.skinIndex=(state.skinIndex+1)%skins.length;
        const span = clickBtn?.querySelector('span');
        if(span) span.innerHTML = skins[state.skinIndex];
        createGlobalToast(`🎨 皮肤: ${skins[state.skinIndex]}`);
    });
    
    document.getElementById('coffeeBtn')?.addEventListener('click', () => {
        if(state.score<500){createGlobalToast("需要500咖啡");return;}
        state.score-=500;
        state.coffeeEnd=Date.now()+30000;
        createGlobalToast("☕ 咖啡因爆发! 30秒x2");
        updateUI(); syncScoreToCloud();
    });
    
    document.getElementById('magnetBtn')?.addEventListener('click', () => {
        if(state.magnetActive){createGlobalToast("磁铁已激活");return;}
        if(state.score<1200){createGlobalToast("需要1200积分");return;}
        state.score-=1200;
        state.magnetActive=true;
        createGlobalToast("🧲 代码磁铁激活!");
        updateUI(); syncScoreToCloud();
    });
    
    document.getElementById('mentorBtn')?.addEventListener('click', () => {
        if(state.mentorBonus>=5){createGlobalToast("导师已满级");return;}
        if(state.score<800){createGlobalToast("需要800");return;}
        state.score-=800;
        state.mentorActive=true;
        state.mentorBonus++;
        createGlobalToast(`👨‍🏫 导师+${state.mentorBonus*10}%点击伤害`);
        updateUI(); syncScoreToCloud();
    });

    // Supabase 同步
    async function syncScoreToCloud() {
        if(!state.nickname || state.nickname === "无名打工人") return;
        try {
            await supabaseFetch('UPSERT', { 
                nickname: state.nickname,
                score: Math.floor(state.score),
                updated_at: new Date().toISOString()
            });
            if(saveTipSpan) {
                saveTipSpan.innerText = "☁️ 已同步";
                setTimeout(() => { if(saveTipSpan) saveTipSpan.innerText = "💾 本地存档中"; }, 1500);
            }
        } catch(e) { console.warn(e); }
    }

    async function fetchLeaderboard() {
        if(!rankListContainer) return;
        try {
            const data = await supabaseFetch('GET');
            if(data && data.length > 0) {
                rankListContainer.innerHTML = data.map((item, idx) => `
                    <div class="rank-item">
                        <span class="rank-number">${idx+1}</span>
                        <span class="rank-name">${escapeHtml(item.nickname)}</span>
                        <span class="rank-score">${Math.floor(item.score).toLocaleString()}</span>
                    </div>
                `).join('');
            } else {
                rankListContainer.innerHTML = '<div class="rank-item">✨ 暂无数据，快成为第一个打工人！</div>';
            }
        } catch(e) {
            rankListContainer.innerHTML = '<div class="rank-item">⚠️ 请先在Supabase创建worker_rank表</div>';
        }
    }
    
    function escapeHtml(str) { 
        if(!str) return "??"; 
        return str.replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }

    async function setNickname() {
        let newName = nicknameInput ? nicknameInput.value.trim() : "";
        if(newName === "") { createGlobalToast("请输入昵称(1~16字符)", 1000); return; }
        if(newName.length > 16) newName = newName.slice(0,16);
        state.nickname = newName;
        if(currentNickDisplay) currentNickDisplay.innerText = `👤 ${state.nickname}`;
        createGlobalToast(`✅ 代号已更改为: ${state.nickname}`, 1200);
        await syncScoreToCloud();
        await fetchLeaderboard();
        saveLocalData();
    }

    function saveLocalData() {
        let data = { 
            nickname: state.nickname, score: state.score, clickPower: state.clickPower, 
            autoRate: state.autoRate, costClick: state.costClick, costAuto: state.costAuto,
            critChance: state.critChance, critDamage: state.critDamage, petHappy: state.petHappy,
            dividendRate: state.dividendRate, magnetActive: state.magnetActive,
            mentorActive: state.mentorActive, mentorBonus: state.mentorBonus, skinIndex: state.skinIndex 
        };
        localStorage.setItem('cyberWorkerFull', JSON.stringify(data));
    }
    
    function loadLocalData() {
        let raw = localStorage.getItem('cyberWorkerFull');
        if(raw) {
            try {
                let d = JSON.parse(raw);
                state.nickname = d.nickname || "无名打工人";
                state.score = d.score || 0;
                state.clickPower = d.clickPower || 1;
                state.autoRate = d.autoRate || 0;
                state.costClick = d.costClick || 100;
                state.costAuto = d.costAuto || 500;
                state.critChance = d.critChance || 0.15;
                state.critDamage = d.critDamage || 2.0;
                state.petHappy = d.petHappy || 0;
                state.dividendRate = d.dividendRate || 0;
                state.magnetActive = d.magnetActive || false;
                state.mentorActive = d.mentorActive || false;
                state.mentorBonus = d.mentorBonus || 0;
                state.skinIndex = d.skinIndex || 0;
                if(currentNickDisplay) currentNickDisplay.innerText = `👤 ${state.nickname}`;
                if(nicknameInput) nicknameInput.value = state.nickname;
            } catch(e) {}
        }
    }

    function updateAchievement() { 
        const badge = document.getElementById('achievementBadge');
        if(!badge) return;
        if(state.score>=10000) badge.innerText="🏆 成就: 代码之神"; 
        else if(state.score>=5000) badge.innerText="🏆 成就: 全栈宗师"; 
        else if(state.score>=2000) badge.innerText="🏆 成就: 资深码农"; 
        else badge.innerText="🏆 成就: 新手码农"; 
    }

    function updateUI() {
        if(elScore) elScore.innerText = Math.floor(state.score).toLocaleString();
        if(elCps) elCps.innerText = state.autoRate;
        if(elCostClick) document.getElementById('costClick').innerText = state.costClick.toLocaleString();
        if(elCostAuto) document.getElementById('costAuto').innerText = state.costAuto.toLocaleString();
        if(elCritMult) elCritMult.innerText = `${Math.floor(state.critChance*100)}%/${state.critDamage.toFixed(1)}x`;
        if(btnUpgradeClick) btnUpgradeClick.disabled = state.score < state.costClick;
        if(btnUpgradeAuto) btnUpgradeAuto.disabled = state.score < state.costAuto;
        const petDisplay = document.getElementById('petDisplay');
        if(petDisplay) petDisplay.innerText = `🐱 打工喵: +${state.petHappy*6}%伤害`;
        updateAchievement();
        const span = clickBtn?.querySelector('span');
        if(span && !state.isBossMode) span.innerHTML = skins[state.skinIndex] || "🐛";
    }

    // 绑定改名按钮
    if(setNicknameBtn) setNicknameBtn.onclick = setNickname;
    const refreshBtn = document.getElementById('refreshLeaderboardBtn');
    if(refreshBtn) refreshBtn.onclick = fetchLeaderboard;
    
    // ========== 自动刷新排行榜（每10秒）==========
    let autoRefreshInterval = null;
    
    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(() => {
            fetchLeaderboard();
            console.log("🔄 排行榜自动刷新中...");
        }, 10000); // 10秒刷新一次
    }
    
    function stopAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    }
    
    // 初始化
    loadLocalData();
    updateUI();
    fetchLeaderboard();
    startAutoRefresh(); // 启动自动刷新
    
    // 每30秒同步分数到云端
    setInterval(() => { 
        syncScoreToCloud(); 
        saveLocalData(); 
    }, 30000);
    
    window.addEventListener('beforeunload', () => { 
        syncScoreToCloud(); 
        saveLocalData();
        stopAutoRefresh();
    });
    
    createGlobalToast("🎉 输入昵称，点击🐛打工，排行榜每10秒自动更新!", 3000);
    console.log("✅ 游戏已启动，排行榜自动刷新已开启");
</script>
</body>
</html>
